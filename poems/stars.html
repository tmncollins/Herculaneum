<div id="poem" class="poem">
<h1 class="poem-title">Stars</h1>I like to go out
At night and look up 
At the stars which hang
Motionless against
The darkening sky.
Alone I draw pictures,
In scrawling red pen,
Of glistening stars
Burning papery holes.
But people just laugh,
They are quite concerned:
They say I am wrong.
There’s no such thing as
Stars.
